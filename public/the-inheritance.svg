<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2028"/><stop offset="40%" stop-color="#2a3038"/>
      <stop offset="70%" stop-color="#384030"/><stop offset="100%" stop-color="#1a2818"/>
    </linearGradient>
    <radialGradient id="lightning" cx="30%" cy="15%" r="25%">
      <stop offset="0%" stop-color="#a0b8d0" stop-opacity="0.15"/><stop offset="100%" stop-color="#1a2028" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="4"/></filter>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2018"/><stop offset="100%" stop-color="#0a0e08"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#sky)"/>
  <rect width="800" height="450" fill="url(#lightning)"/>

  <!-- Storm clouds -->
  <g fill="#2a3038" opacity="0.8">
    <ellipse cx="150" cy="50" rx="140" ry="50"/><ellipse cx="350" cy="40" rx="160" ry="55"/>
    <ellipse cx="550" cy="55" rx="130" ry="45"/><ellipse cx="720" cy="45" rx="120" ry="50"/>
    <ellipse cx="250" cy="75" rx="120" ry="40"/><ellipse cx="600" cy="80" rx="110" ry="38"/>
  </g>
  <!-- Lighter cloud edges -->
  <g fill="#3a4548" opacity="0.5">
    <ellipse cx="200" cy="38" rx="80" ry="25"/><ellipse cx="480" cy="32" rx="70" ry="22"/>
    <ellipse cx="680" cy="42" rx="75" ry="24"/>
  </g>

  <!-- Lightning bolt -->
  <g stroke="#c0d8ff" stroke-width="2" fill="none" opacity="0.25" filter="url(#glow)">
    <path d="M240,30 L235,60 L248,58 L238,95 L255,90 L242,130"/>
  </g>

  <!-- Highland hills (layered) -->
  <g fill="#1a2818" opacity="0.7">
    <polygon points="0,300 60,260 130,275 200,248 280,265 350,240 420,258 500,235 570,252 640,238 720,255 800,242 800,320 0,320"/>
  </g>
  <g fill="#152218" opacity="0.85">
    <polygon points="0,330 80,298 160,310 240,288 320,305 400,285 480,300 560,282 640,298 720,280 800,295 800,360 0,360"/>
  </g>

  <!-- Manor on hill -->
  <g fill="#0c1210">
    <!-- Main body -->
    <rect x="300" y="215" width="200" height="140"/>
    <!-- Left wing -->
    <rect x="240" y="248" width="65" height="107"/>
    <!-- Right wing -->
    <rect x="495" y="252" width="60" height="103"/>
    <!-- Central tower -->
    <rect x="365" y="168" width="70" height="52"/>
    <polygon points="398,130 408,168 388,168"/>
    <!-- Left tower -->
    <rect x="248" y="205" width="45" height="48"/>
    <polygon points="270,178 280,205 260,205"/>
    <!-- Right tower -->
    <rect x="502" y="210" width="42" height="45"/>
    <polygon points="523,185 533,210 513,210"/>
    <!-- Battlements -->
    <rect x="300" y="210" width="12" height="10"/><rect x="320" y="210" width="12" height="10"/>
    <rect x="340" y="210" width="12" height="10"/><rect x="460" y="210" width="12" height="10"/>
    <rect x="480" y="210" width="12" height="10"/>
  </g>

  <!-- Manor windows (cold amber) -->
  <g filter="url(#glow)">
    <rect x="320" y="250" width="12" height="16" fill="#a08030" rx="1"/>
    <rect x="355" y="248" width="12" height="16" fill="#c09838" rx="1"/>
    <rect x="435" y="250" width="12" height="16" fill="#a08030" rx="1"/>
    <rect x="470" y="248" width="12" height="16" fill="#c09838" rx="1"/>
    <rect x="320" y="290" width="12" height="16" fill="#806828" rx="1"/>
    <rect x="470" y="290" width="12" height="16" fill="#806828" rx="1"/>
    <rect x="258" y="268" width="10" height="14" fill="#a08030" rx="1"/>
    <rect x="510" y="270" width="10" height="14" fill="#a08030" rx="1"/>
    <!-- Tower window -->
    <rect x="390" y="180" width="10" height="14" fill="#c09838" rx="1"/>
  </g>

  <!-- Dead trees -->
  <g stroke="#1a2818" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.9">
    <line x1="160" y1="380" x2="160" y2="268"/>
    <line x1="160" y1="292" x2="135" y2="272"/><line x1="135" y1="272" x2="118" y2="260"/>
    <line x1="160" y1="300" x2="185" y2="282"/><line x1="185" y1="282" x2="198" y2="270"/>
    <line x1="660" y1="380" x2="660" y2="272"/>
    <line x1="660" y1="295" x2="638" y2="278"/><line x1="638" y1="278" x2="622" y2="265"/>
    <line x1="660" y1="302" x2="685" y2="285"/><line x1="685" y1="285" x2="700" y2="272"/>
    <line x1="720" y1="380" x2="720" y2="288" stroke-width="2.5"/>
    <line x1="720" y1="308" x2="740" y2="295" stroke-width="2"/>
  </g>

  <!-- Path to manor -->
  <polygon points="370,450 430,450 460,355 340,355" fill="#151a12" opacity="0.7"/>

  <!-- Fog in valleys -->
  <ellipse cx="400" cy="365" rx="500" ry="35" fill="#2a3530" opacity="0.3" filter="url(#soft)"/>
  <ellipse cx="200" cy="370" rx="180" ry="25" fill="#283028" opacity="0.25" filter="url(#soft)"/>
  <ellipse cx="650" cy="368" rx="160" ry="22" fill="#283028" opacity="0.25" filter="url(#soft)"/>

  <!-- Ground -->
  <rect x="0" y="370" width="800" height="80" fill="url(#ground)"/>

  <!-- Heather texture -->
  <g fill="#2a1830" opacity="0.3">
    <ellipse cx="100" cy="395" rx="60" ry="12"/><ellipse cx="300" cy="400" rx="70" ry="10"/>
    <ellipse cx="550" cy="392" rx="55" ry="11"/><ellipse cx="720" cy="398" rx="50" ry="10"/>
  </g>

  <!-- Rain -->
  <g stroke="#3a4548" stroke-width="0.6" opacity="0.35">
    <line x1="60" y1="100" x2="55" y2="160"/><line x1="150" y1="95" x2="145" y2="155"/>
    <line x1="250" y1="100" x2="245" y2="160"/><line x1="350" y1="98" x2="345" y2="158"/>
    <line x1="450" y1="102" x2="445" y2="162"/><line x1="550" y1="95" x2="545" y2="155"/>
    <line x1="650" y1="100" x2="645" y2="160"/><line x1="750" y1="98" x2="745" y2="158"/>
    <line x1="100" y1="165" x2="95" y2="235"/><line x1="300" y1="162" x2="295" y2="232"/>
    <line x1="500" y1="168" x2="495" y2="238"/><line x1="700" y1="160" x2="695" y2="230"/>
  </g>

  <radialGradient id="vig" cx="50%" cy="50%" r="65%">
    <stop offset="0%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="800" height="450" fill="url(#vig)"/>
  <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0a0e08" stop-opacity="0"/><stop offset="100%" stop-color="#0a0e08" stop-opacity="0.8"/>
  </linearGradient>
  <rect width="800" height="450" fill="url(#fade)"/>
</svg>