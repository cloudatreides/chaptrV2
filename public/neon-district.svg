<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#04081a"/><stop offset="55%" stop-color="#0a1228"/>
      <stop offset="100%" stop-color="#0e1830"/>
    </linearGradient>
    <radialGradient id="neon-r" cx="35%" cy="45%" r="20%">
      <stop offset="0%" stop-color="#ff2080" stop-opacity="0.4"/><stop offset="100%" stop-color="#0a1228" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neon-b" cx="65%" cy="40%" r="18%">
      <stop offset="0%" stop-color="#20d0ff" stop-opacity="0.35"/><stop offset="100%" stop-color="#0a1228" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <rect width="800" height="450" fill="url(#sky)"/>
  <rect width="800" height="450" fill="url(#neon-r)"/>
  <rect width="800" height="450" fill="url(#neon-b)"/>

  <!-- Far buildings -->
  <g fill="#0a1025">
    <rect x="0" y="100" width="55" height="350"/><rect x="50" y="80" width="65" height="370"/>
    <rect x="110" y="110" width="45" height="340"/><rect x="620" y="75" width="70" height="375"/>
    <rect x="685" y="95" width="50" height="355"/><rect x="730" y="115" width="70" height="335"/>
  </g>
  <g fill="#1a3050" opacity="0.6">
    <rect x="10" y="115" width="7" height="10" rx="1"/><rect x="28" y="118" width="7" height="10" rx="1"/>
    <rect x="10" y="138" width="7" height="10" rx="1"/><rect x="28" y="140" width="7" height="10" rx="1"/>
    <rect x="60" y="95" width="7" height="10" rx="1"/><rect x="80" y="98" width="7" height="10" rx="1"/>
    <rect x="100" y="95" width="7" height="10" rx="1"/>
    <rect x="632" y="90" width="7" height="10" rx="1"/><rect x="655" y="92" width="7" height="10" rx="1"/>
    <rect x="675" y="90" width="7" height="10" rx="1"/>
    <rect x="695" y="110" width="7" height="10" rx="1"/><rect x="715" y="112" width="7" height="10" rx="1"/>
    <rect x="740" y="130" width="7" height="10" rx="1"/><rect x="760" y="128" width="7" height="10" rx="1"/>
  </g>

  <!-- Mid buildings -->
  <g fill="#081020">
    <rect x="140" y="140" width="100" height="310"/><rect x="235" y="120" width="80" height="330"/>
    <rect x="480" y="130" width="90" height="320"/><rect x="565" y="150" width="65" height="300"/>
  </g>
  <g fill="#2050a0" opacity="0.7">
    <rect x="152" y="155" width="9" height="13" rx="1"/><rect x="175" y="158" width="9" height="13" rx="1"/>
    <rect x="198" y="155" width="9" height="13" rx="1" fill="#30c0e0"/>
    <rect x="152" y="182" width="9" height="13" rx="1" fill="#30c0e0"/><rect x="175" y="185" width="9" height="13" rx="1"/>
    <rect x="198" y="182" width="9" height="13" rx="1"/>
    <rect x="248" y="135" width="9" height="13" rx="1"/><rect x="270" y="138" width="9" height="13" rx="1" fill="#30c0e0"/>
    <rect x="292" y="135" width="9" height="13" rx="1"/>
    <rect x="248" y="162" width="9" height="13" rx="1" fill="#30c0e0"/><rect x="292" y="162" width="9" height="13" rx="1"/>
    <rect x="492" y="145" width="9" height="13" rx="1"/><rect x="515" y="148" width="9" height="13" rx="1" fill="#30c0e0"/>
    <rect x="538" y="145" width="9" height="13" rx="1"/><rect x="492" y="172" width="9" height="13" rx="1"/>
    <rect x="538" y="172" width="9" height="13" rx="1" fill="#30c0e0"/>
    <rect x="578" y="165" width="9" height="13" rx="1"/><rect x="600" y="168" width="9" height="13" rx="1"/>
  </g>

  <!-- Neon signs -->
  <g filter="url(#glow)">
    <rect x="305" y="175" width="85" height="24" rx="4" fill="none" stroke="#ff2080" stroke-width="2.5" opacity="0.9"/>
    <text x="347" y="192" text-anchor="middle" fill="#ff60a0" font-size="11" font-family="monospace" font-weight="bold">NEON</text>
    <rect x="415" y="185" width="60" height="20" rx="3" fill="none" stroke="#20d0ff" stroke-width="2" opacity="0.85"/>
    <text x="445" y="199" text-anchor="middle" fill="#60e0ff" font-size="9" font-family="monospace">DATA</text>
    <rect x="170" y="210" width="55" height="18" rx="3" fill="#c01060" opacity="0.25"/>
    <text x="197" y="223" text-anchor="middle" fill="#ff4090" font-size="8" font-family="monospace">BAR</text>
    <rect x="550" y="205" width="65" height="18" rx="3" fill="#1060c0" opacity="0.2"/>
    <text x="582" y="218" text-anchor="middle" fill="#40c0ff" font-size="8" font-family="monospace">HOTEL</text>
  </g>

  <!-- Foreground buildings -->
  <g fill="#060c1a">
    <rect x="310" y="230" width="180" height="220"/><rect x="280" y="260" width="35" height="190"/>
    <rect x="485" y="245" width="30" height="205"/>
  </g>

  <!-- Holographic ad (subtle) -->
  <rect x="330" y="245" width="50" height="30" rx="2" fill="#20d0ff" opacity="0.08" filter="url(#soft)"/>

  <!-- Flying vehicle silhouette -->
  <g fill="#0a1528" opacity="0.7">
    <ellipse cx="620" cy="68" rx="22" ry="6"/>
    <rect x="612" y="64" width="16" height="8" rx="2"/>
  </g>
  <circle cx="615" cy="68" r="2" fill="#ff3050" opacity="0.6" filter="url(#glow)"/>
  <circle cx="638" cy="68" r="1.5" fill="#20d0ff" opacity="0.5" filter="url(#glow)"/>

  <!-- Wet street -->
  <rect x="0" y="365" width="800" height="85" fill="#060c18"/>
  <!-- Puddle reflections -->
  <ellipse cx="350" cy="395" rx="70" ry="15" fill="#10203a" opacity="0.8" filter="url(#soft)"/>
  <ellipse cx="350" cy="395" rx="35" ry="7" fill="#ff2080" opacity="0.15" filter="url(#soft)"/>
  <ellipse cx="500" cy="405" rx="55" ry="12" fill="#10203a" opacity="0.7" filter="url(#soft)"/>
  <ellipse cx="500" cy="405" rx="28" ry="6" fill="#20d0ff" opacity="0.12" filter="url(#soft)"/>

  <!-- Rain -->
  <g stroke="#1a3050" stroke-width="0.7" opacity="0.45">
    <line x1="55" y1="0" x2="48" y2="65"/><line x1="130" y1="10" x2="123" y2="75"/>
    <line x1="200" y1="0" x2="193" y2="68"/><line x1="280" y1="12" x2="273" y2="78"/>
    <line x1="350" y1="0" x2="343" y2="62"/><line x1="420" y1="8" x2="413" y2="72"/>
    <line x1="500" y1="0" x2="493" y2="65"/><line x1="580" y1="15" x2="573" y2="78"/>
    <line x1="660" y1="0" x2="653" y2="68"/><line x1="740" y1="10" x2="733" y2="75"/>
    <line x1="90" y1="80" x2="83" y2="150"/><line x1="165" y1="72" x2="158" y2="142"/>
    <line x1="310" y1="68" x2="303" y2="138"/><line x1="450" y1="75" x2="443" y2="145"/>
    <line x1="620" y1="70" x2="613" y2="140"/><line x1="710" y1="78" x2="703" y2="148"/>
  </g>

  <radialGradient id="vig" cx="50%" cy="50%" r="62%">
    <stop offset="0%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="800" height="450" fill="url(#vig)"/>
  <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#040810" stop-opacity="0"/><stop offset="100%" stop-color="#040810" stop-opacity="0.75"/>
  </linearGradient>
  <rect width="800" height="450" fill="url(#fade)"/>
</svg>