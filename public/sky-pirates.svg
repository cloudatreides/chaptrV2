<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a1a3a"/>
      <stop offset="40%" stop-color="#8a3a1a"/>
      <stop offset="70%" stop-color="#c46a20"/>
      <stop offset="100%" stop-color="#4a1a3a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Clouds -->
  <ellipse cx="80" cy="200" rx="60" ry="20" fill="#c46a20" opacity="0.2"/>
  <ellipse cx="350" cy="160" rx="50" ry="15" fill="#c46a20" opacity="0.15"/>
  <ellipse cx="50" cy="100" rx="40" ry="12" fill="#8a3a1a" opacity="0.15"/>
  <ellipse cx="320" cy="250" rx="70" ry="18" fill="#4a1a3a" opacity="0.25"/>
  <!-- Airship body -->
  <ellipse cx="200" cy="110" rx="70" ry="30" fill="#1a0a15" opacity="0.85"/>
  <!-- Gondola -->
  <rect x="175" y="145" width="50" height="20" rx="3" fill="#1a0a15" opacity="0.85"/>
  <!-- Rigging lines -->
  <line x1="175" y1="145" x2="155" y2="130" stroke="#1a0a15" stroke-width="1" opacity="0.6"/>
  <line x1="225" y1="145" x2="245" y2="130" stroke="#1a0a15" stroke-width="1" opacity="0.6"/>
  <line x1="190" y1="145" x2="180" y2="135" stroke="#1a0a15" stroke-width="1" opacity="0.6"/>
  <line x1="210" y1="145" x2="220" y2="135" stroke="#1a0a15" stroke-width="1" opacity="0.6"/>
  <!-- Fins -->
  <path d="M265 100 L290 90 L280 115 Z" fill="#1a0a15" opacity="0.8"/>
  <path d="M265 120 L290 130 L280 105 Z" fill="#1a0a15" opacity="0.8"/>
  <!-- Propeller hint -->
  <circle cx="132" cy="110" r="3" fill="#1a0a15" opacity="0.7"/>
  <rect x="125" y="100" width="14" height="2" rx="1" fill="#1a0a15" opacity="0.5"/>
  <rect x="130" y="103" width="4" height="14" rx="1" fill="#1a0a15" opacity="0.5"/>
  <!-- Sun glow -->
  <circle cx="350" cy="80" r="30" fill="#c46a20" opacity="0.15"/>
</svg>