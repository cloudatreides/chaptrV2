<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e0828"/><stop offset="25%" stop-color="#2a1248"/>
      <stop offset="55%" stop-color="#8a3818"/><stop offset="80%" stop-color="#d06020"/>
      <stop offset="100%" stop-color="#e89030"/>
    </linearGradient>
    <radialGradient id="sun" cx="60%" cy="72%" r="25%">
      <stop offset="0%" stop-color="#ffc060" stop-opacity="0.8"/><stop offset="100%" stop-color="#8a3818" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>

  <rect width="800" height="450" fill="url(#sky)"/>
  <rect width="800" height="450" fill="url(#sun)"/>

  <!-- Stars (upper sky) -->
  <g fill="#c0a8e0" opacity="0.5">
    <circle cx="60" cy="30" r="1.5"/><circle cx="150" cy="18" r="1"/><circle cx="240" cy="42" r="1.2"/>
    <circle cx="340" cy="22" r="1"/><circle cx="450" cy="38" r="1.5"/><circle cx="560" cy="25" r="1"/>
    <circle cx="680" cy="35" r="1.2"/><circle cx="750" cy="15" r="1"/>
  </g>

  <!-- Light rays from sun -->
  <g opacity="0.1" fill="#ffc060">
    <polygon points="480,310 440,0 460,0"/><polygon points="480,310 490,0 510,0"/>
    <polygon points="480,310 540,0 558,0"/><polygon points="480,310 380,0 400,0"/>
  </g>

  <!-- Cloud banks (layered) -->
  <g fill="#d08038" opacity="0.3">
    <ellipse cx="200" cy="280" rx="200" ry="40"/><ellipse cx="600" cy="285" rx="180" ry="35"/>
    <ellipse cx="400" cy="300" rx="250" ry="45"/>
  </g>
  <g fill="#a06028" opacity="0.4">
    <ellipse cx="120" cy="340" rx="180" ry="50"/><ellipse cx="450" cy="350" rx="200" ry="55"/>
    <ellipse cx="700" cy="345" rx="170" ry="48"/>
  </g>
  <g fill="#6a3818" opacity="0.5">
    <ellipse cx="250" cy="390" rx="250" ry="55"/><ellipse cx="600" cy="395" rx="220" ry="50"/>
  </g>
  <!-- Cloud highlights -->
  <g fill="#e8a050" opacity="0.2">
    <ellipse cx="180" cy="270" rx="80" ry="18"/><ellipse cx="560" cy="275" rx="70" ry="15"/>
  </g>

  <!-- Distant floating structure -->
  <g fill="#3a1a08" opacity="0.6">
    <rect x="120" y="225" width="60" height="35" rx="3"/>
    <polygon points="120,225 150,205 180,225"/>
    <rect x="145" y="200" width="8" height="12"/>
  </g>
  <rect x="135" y="238" width="8" height="10" fill="#c08030" opacity="0.5" rx="1" filter="url(#glow)"/>

  <!-- Airship (detailed) -->
  <g fill="#1a0c04">
    <!-- Envelope (balloon) -->
    <ellipse cx="420" cy="155" rx="140" ry="55"/>
    <!-- Envelope stripes/panels -->
    <ellipse cx="420" cy="155" rx="140" ry="55" fill="none" stroke="#2a1808" stroke-width="1.5" opacity="0.6"/>
    <line x1="420" y1="100" x2="420" y2="210" stroke="#2a1808" stroke-width="1" opacity="0.4"/>
    <line x1="380" y1="102" x2="380" y2="208" stroke="#2a1808" stroke-width="0.8" opacity="0.3"/>
    <line x1="460" y1="102" x2="460" y2="208" stroke="#2a1808" stroke-width="0.8" opacity="0.3"/>
    <!-- Gondola -->
    <rect x="370" y="215" width="100" height="35" rx="5"/>
    <rect x="365" y="213" width="110" height="8" rx="3"/>
    <!-- Rigging lines -->
    <line x1="375" y1="213" x2="340" y2="185" stroke="#2a1808" stroke-width="1.5"/>
    <line x1="465" y1="213" x2="500" y2="185" stroke="#2a1808" stroke-width="1.5"/>
    <line x1="395" y1="213" x2="380" y2="195" stroke="#2a1808" stroke-width="1"/>
    <line x1="445" y1="213" x2="460" y2="195" stroke="#2a1808" stroke-width="1"/>
    <!-- Propeller (rear) -->
    <rect x="555" y="148" width="22" height="6" rx="2"/>
    <ellipse cx="580" cy="151" rx="4" ry="18" fill="#2a1808" opacity="0.5"/>
    <!-- Rudder/fins -->
    <polygon points="548,130 568,145 548,155" fill="#2a1808"/>
    <polygon points="548,160 568,155 548,175" fill="#2a1808"/>
    <!-- Keel fin -->
    <polygon points="385,250 420,268 455,250" fill="#1a0c04"/>
  </g>

  <!-- Gondola windows -->
  <g filter="url(#glow)">
    <rect x="382" y="225" width="8" height="10" fill="#d09030" rx="1"/>
    <rect x="400" y="225" width="8" height="10" fill="#c08028" rx="1"/>
    <rect x="418" y="225" width="8" height="10" fill="#d09030" rx="1"/>
    <rect x="436" y="225" width="8" height="10" fill="#c08028" rx="1"/>
    <rect x="454" y="225" width="8" height="10" fill="#d09030" rx="1"/>
  </g>

  <!-- Birds -->
  <g stroke="#3a1808" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M200,130 Q205,125 210,130 Q215,125 220,130"/>
    <path d="M680,110 Q685,105 690,110 Q695,105 700,110"/>
    <path d="M620,150 Q624,146 628,150 Q632,146 636,150"/>
  </g>

  <!-- Bottom clouds -->
  <g fill="#4a2810" opacity="0.6">
    <ellipse cx="400" cy="430" rx="500" ry="60"/>
  </g>

  <radialGradient id="vig" cx="50%" cy="45%" r="65%">
    <stop offset="0%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
  </radialGradient>
  <rect width="800" height="450" fill="url(#vig)"/>
  <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0a0410" stop-opacity="0"/><stop offset="100%" stop-color="#0a0410" stop-opacity="0.7"/>
  </linearGradient>
  <rect width="800" height="450" fill="url(#fade)"/>
</svg>