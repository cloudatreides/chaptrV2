<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="space" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020408"/><stop offset="50%" stop-color="#06102a"/>
      <stop offset="100%" stop-color="#0a1838"/>
    </linearGradient>
    <radialGradient id="nebula" cx="75%" cy="35%" r="30%">
      <stop offset="0%" stop-color="#4020a0" stop-opacity="0.15"/><stop offset="100%" stop-color="#06102a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="engine" cx="28%" cy="58%" r="8%">
      <stop offset="0%" stop-color="#40c0ff" stop-opacity="0.6"/><stop offset="100%" stop-color="#06102a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <rect width="800" height="450" fill="url(#space)"/>
  <rect width="800" height="450" fill="url(#nebula)"/>

  <!-- Star field -->
  <g fill="#e0e8ff">
    <circle cx="45" cy="25" r="1.5" opacity="0.9"/><circle cx="120" cy="60" r="1" opacity="0.6"/>
    <circle cx="200" cy="18" r="1.8" opacity="0.8"/><circle cx="280" cy="80" r="1" opacity="0.5"/>
    <circle cx="340" cy="35" r="1.2" opacity="0.7"/><circle cx="420" cy="70" r="0.8" opacity="0.4"/>
    <circle cx="500" cy="25" r="1.5" opacity="0.8"/><circle cx="580" cy="55" r="1" opacity="0.6"/>
    <circle cx="650" cy="20" r="1.2" opacity="0.7"/><circle cx="720" cy="48" r="1.5" opacity="0.9"/>
    <circle cx="780" cy="30" r="1" opacity="0.5"/><circle cx="70" cy="110" r="0.8" opacity="0.4"/>
    <circle cx="160" cy="140" r="1.2" opacity="0.6"/><circle cx="400" cy="120" r="1" opacity="0.5"/>
    <circle cx="540" cy="100" r="1.5" opacity="0.7"/><circle cx="680" cy="130" r="0.8" opacity="0.4"/>
    <circle cx="760" cy="95" r="1" opacity="0.6"/><circle cx="30" cy="200" r="1.2" opacity="0.5"/>
    <circle cx="100" cy="280" r="1" opacity="0.4"/><circle cx="700" cy="250" r="1.2" opacity="0.5"/>
    <circle cx="750" cy="180" r="0.8" opacity="0.3"/><circle cx="620" cy="300" r="1" opacity="0.4"/>
    <circle cx="80" cy="350" r="0.8" opacity="0.3"/><circle cx="740" cy="350" r="1" opacity="0.4"/>
    <circle cx="50" cy="400" r="1.2" opacity="0.3"/><circle cx="770" cy="400" r="0.8" opacity="0.3"/>
  </g>

  <!-- Distant planet/moon -->
  <circle cx="660" cy="340" r="55" fill="#0a1838" opacity="0.9"/>
  <circle cx="660" cy="340" r="55" fill="none" stroke="#1a3060" stroke-width="1" opacity="0.5"/>
  <path d="M620,305 Q660,298 700,310" stroke="#1a3060" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M615,325 Q660,318 705,330" stroke="#1a3060" stroke-width="0.6" fill="none" opacity="0.3"/>
  <!-- Planet atmosphere edge -->
  <circle cx="660" cy="340" r="58" fill="none" stroke="#2050a0" stroke-width="1.5" opacity="0.2" filter="url(#soft)"/>

  <!-- Signal waves (from distance) -->
  <g stroke="#40c0ff" stroke-width="1" fill="none" opacity="0.15">
    <path d="M720,200 Q740,220 720,240"/><path d="M730,195 Q755,220 730,245"/>
    <path d="M740,190 Q770,220 740,250"/>
  </g>

  <!-- Ship (detailed) -->
  <g fill="#0c1828">
    <!-- Main hull -->
    <polygon points="180,250 340,235 380,255 340,275 180,260"/>
    <!-- Bridge/command section -->
    <rect x="310" y="232" width="40" height="30" rx="4"/>
    <polygon points="350,235 370,248 350,260"/>
    <!-- Cargo section -->
    <rect x="200" y="238" width="115" height="28" rx="3"/>
    <!-- Engine nacelles -->
    <rect x="170" y="230" width="20" height="14" rx="3"/>
    <rect x="170" y="264" width="20" height="14" rx="3"/>
    <!-- Antenna arrays -->
    <line x1="355" y1="232" x2="365" y2="218" stroke="#1a3050" stroke-width="1.5"/>
    <line x1="355" y1="268" x2="365" y2="282" stroke="#1a3050" stroke-width="1.5"/>
    <circle cx="365" cy="216" r="2" fill="#1a3050"/>
    <!-- Solar panels -->
    <rect x="250" y="218" width="45" height="6" rx="1" fill="#0a1525"/>
    <rect x="250" y="284" width="45" height="6" rx="1" fill="#0a1525"/>
  </g>

  <!-- Engine glow -->
  <rect width="800" height="450" fill="url(#engine)"/>
  <g filter="url(#glow)">
    <ellipse cx="168" cy="237" rx="8" ry="4" fill="#40c0ff" opacity="0.8"/>
    <ellipse cx="168" cy="271" rx="8" ry="4" fill="#40c0ff" opacity="0.8"/>
    <ellipse cx="160" cy="237" rx="15" ry="6" fill="#2080c0" opacity="0.3"/>
    <ellipse cx="160" cy="271" rx="15" ry="6" fill="#2080c0" opacity="0.3"/>
  </g>

  <!-- Ship windows -->
  <g filter="url(#glow)">
    <rect x="318" y="242" width="6" height="8" fill="#40c0ff" rx="1" opacity="0.7"/>
    <rect x="330" y="244" width="6" height="8" fill="#30a0d0" rx="1" opacity="0.6"/>
    <rect x="342" y="246" width="6" height="8" fill="#40c0ff" rx="1" opacity="0.7"/>
    <rect x="220" y="248" width="5" height="7" fill="#2080a0" rx="1" opacity="0.4"/>
    <rect x="240" y="248" width="5" height="7" fill="#2080a0" rx="1" opacity="0.4"/>
    <rect x="260" y="248" width="5" height="7" fill="#2080a0" rx="1" opacity="0.4"/>
  </g>

  <radialGradient id="vig" cx="50%" cy="50%" r="65%">
    <stop offset="0%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
  </radialGradient>
  <rect width="800" height="450" fill="url(#vig)"/>
  <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#020408" stop-opacity="0"/><stop offset="100%" stop-color="#020408" stop-opacity="0.6"/>
  </linearGradient>
  <rect width="800" height="450" fill="url(#fade)"/>
</svg>