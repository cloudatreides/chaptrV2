<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1030"/>
      <stop offset="40%" stop-color="#1a2855"/>
      <stop offset="75%" stop-color="#4a3520"/>
      <stop offset="100%" stop-color="#c89040"/>
    </linearGradient>
    <radialGradient id="sun-glow" cx="50%" cy="80%" r="35%">
      <stop offset="0%" stop-color="#e0a040" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a2855" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft"><feGaussianBlur stdDeviation="4"/></filter>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1e12"/><stop offset="100%" stop-color="#0a0808"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#sky)"/>
  <rect width="800" height="450" fill="url(#sun-glow)"/>

  <!-- Stars -->
  <g fill="#c0b8e0" opacity="0.5">
    <circle cx="60" cy="28" r="1.5"/><circle cx="140" cy="15" r="1"/><circle cx="250" cy="40" r="1.2"/>
    <circle cx="350" cy="18" r="1"/><circle cx="480" cy="32" r="1.5"/><circle cx="600" cy="22" r="1"/>
    <circle cx="700" cy="38" r="1.2"/><circle cx="760" cy="15" r="1"/>
  </g>

  <!-- Distant campus buildings -->
  <g fill="#12102a" opacity="0.8">
    <rect x="0" y="220" width="70" height="230"/><polygon points="0,220 35,200 70,220"/>
    <rect x="65" y="235" width="50" height="215"/><polygon points="65,235 90,218 115,235"/>
    <rect x="650" y="225" width="60" height="225"/><polygon points="650,225 680,205 710,225"/>
    <rect x="705" y="230" width="95" height="220"/><polygon points="705,230 752,208 800,230"/>
  </g>
  <g fill="#c09030" opacity="0.6">
    <rect x="15" y="235" width="7" height="9" rx="1"/><rect x="35" y="238" width="7" height="9" rx="1"/>
    <rect x="15" y="256" width="7" height="9" rx="1"/><rect x="35" y="258" width="7" height="9" rx="1" fill="#e0a840"/>
    <rect x="665" y="240" width="7" height="9" rx="1"/><rect x="685" y="242" width="7" height="9" rx="1" fill="#e0a840"/>
    <rect x="720" y="245" width="7" height="9" rx="1"/><rect x="745" y="248" width="7" height="9" rx="1"/>
    <rect x="770" y="245" width="7" height="9" rx="1" fill="#e0a840"/>
  </g>

  <!-- Main university building -->
  <g fill="#0c0a20">
    <rect x="220" y="195" width="360" height="225"/>
    <rect x="160" y="230" width="65" height="190"/>
    <rect x="575" y="235" width="65" height="185"/>
    <polygon points="280,195 400,145 520,195"/>
    <ellipse cx="400" cy="145" rx="55" ry="42"/>
    <rect x="392" y="98" width="16" height="20"/><circle cx="400" cy="95" r="8"/>
    <rect x="305" y="195" width="14" height="95"/><rect x="340" y="195" width="14" height="95"/>
    <rect x="375" y="195" width="14" height="95"/><rect x="410" y="195" width="14" height="95"/>
    <rect x="445" y="195" width="14" height="95"/><rect x="480" y="195" width="14" height="95"/>
    <rect x="300" y="288" width="200" height="8"/><rect x="296" y="294" width="208" height="6"/>
    <rect x="280" y="380" width="240" height="12" rx="1"/>
    <rect x="290" y="370" width="220" height="12" rx="1"/>
    <rect x="300" y="360" width="200" height="12" rx="1"/>
  </g>

  <!-- Windows -->
  <g filter="url(#glow)">
    <rect x="235" y="215" width="11" height="15" fill="#d09838" rx="1"/>
    <rect x="260" y="215" width="11" height="15" fill="#c08828" rx="1"/>
    <rect x="530" y="215" width="11" height="15" fill="#d09838" rx="1"/>
    <rect x="555" y="215" width="11" height="15" fill="#c08828" rx="1"/>
    <rect x="235" y="245" width="11" height="15" fill="#c08828" rx="1"/>
    <rect x="260" y="245" width="11" height="15" fill="#d09838" rx="1"/>
    <rect x="530" y="245" width="11" height="15" fill="#c08828" rx="1"/>
    <rect x="555" y="245" width="11" height="15" fill="#d09838" rx="1"/>
    <rect x="385" y="155" width="8" height="12" fill="#e0a840" rx="1"/>
    <rect x="407" y="155" width="8" height="12" fill="#d09838" rx="1"/>
    <rect x="172" y="248" width="10" height="14" fill="#c08828" rx="1"/>
    <rect x="198" y="250" width="10" height="14" fill="#d09838" rx="1"/>
    <rect x="588" y="252" width="10" height="14" fill="#d09838" rx="1"/>
    <rect x="614" y="250" width="10" height="14" fill="#c08828" rx="1"/>
  </g>

  <!-- Clock -->
  <circle cx="400" cy="175" r="12" fill="#1a1535" stroke="#3a3060" stroke-width="1.5"/>
  <circle cx="400" cy="175" r="9" fill="none" stroke="#c09030" stroke-width="0.8" opacity="0.6"/>

  <!-- Trees -->
  <g fill="#0a0818">
    <ellipse cx="140" cy="320" rx="50" ry="65"/><rect x="135" y="350" width="10" height="55"/>
    <ellipse cx="680" cy="315" rx="55" ry="70"/><rect x="675" y="350" width="10" height="55"/>
    <ellipse cx="760" cy="330" rx="40" ry="55"/><rect x="756" y="355" width="8" height="50"/>
    <ellipse cx="80" cy="335" rx="42" ry="55"/><rect x="76" y="360" width="8" height="45"/>
  </g>

  <!-- Pathway -->
  <polygon points="360,450 440,450 480,395 320,395" fill="#1a1510" opacity="0.8"/>

  <!-- Lamp posts -->
  <g stroke="#2a2040" stroke-width="3" fill="none">
    <line x1="310" y1="350" x2="310" y2="420"/><line x1="490" y1="350" x2="490" y2="420"/>
  </g>
  <circle cx="310" cy="345" r="5" fill="#ffd060" filter="url(#glow)"/>
  <circle cx="490" cy="345" r="5" fill="#ffd060" filter="url(#glow)"/>
  <ellipse cx="310" cy="358" rx="18" ry="6" fill="#ffd060" opacity="0.15" filter="url(#soft)"/>
  <ellipse cx="490" cy="358" rx="18" ry="6" fill="#ffd060" opacity="0.15" filter="url(#soft)"/>

  <!-- Ground -->
  <rect x="0" y="390" width="800" height="60" fill="url(#ground)"/>
  <ellipse cx="400" cy="385" rx="500" ry="40" fill="#4a3520" opacity="0.15" filter="url(#soft)"/>

  <!-- Vignette + fade -->
  <radialGradient id="vig" cx="50%" cy="50%" r="65%">
    <stop offset="0%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="800" height="450" fill="url(#vig)"/>
  <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0a0808" stop-opacity="0"/><stop offset="100%" stop-color="#0a0808" stop-opacity="0.8"/>
  </linearGradient>
  <rect width="800" height="450" fill="url(#fade)"/>
</svg>