<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1820"/><stop offset="40%" stop-color="#0c2818"/>
      <stop offset="75%" stop-color="#1a1830"/><stop offset="100%" stop-color="#0a0c18"/>
    </linearGradient>
    <radialGradient id="deep-light" cx="50%" cy="45%" r="20%">
      <stop offset="0%" stop-color="#40c080" stop-opacity="0.2"/><stop offset="100%" stop-color="#0c2818" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="4"/></filter>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1810"/><stop offset="100%" stop-color="#060a08"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#sky)"/>
  <rect width="800" height="450" fill="url(#deep-light)"/>

  <!-- Distant forest (far) -->
  <g fill="#081810" opacity="0.7">
    <polygon points="0,200 20,150 40,170 60,140 80,160 100,130 120,155 140,125 160,148 180,118 200,142 220,128 240,150 260,135 280,158 300,140 320,160 340,145 360,165 380,150 400,168 420,148 440,165 460,142 480,162 500,138 520,158 540,130 560,152 580,135 600,155 620,140 640,162 660,145 680,168 700,148 720,165 740,138 760,158 780,142 800,160 800,250 0,250"/>
  </g>

  <!-- Mid trees forming archway -->
  <g fill="#061210" opacity="0.9">
    <!-- Left tree trunk (twisted) -->
    <path d="M180,420 Q170,350 155,300 Q140,260 120,240 Q100,220 90,190 Q80,160 95,130" stroke="#061210" stroke-width="25" fill="none" stroke-linecap="round"/>
    <!-- Left branches arching right -->
    <path d="M120,240 Q160,220 200,210 Q250,200 300,195 Q340,192 380,195" stroke="#061210" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M140,270 Q180,252 230,245 Q270,240 310,242" stroke="#061210" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M95,200 Q130,180 170,175 Q200,172 230,178" stroke="#061210" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Right tree trunk (twisted) -->
    <path d="M620,420 Q630,350 645,300 Q660,260 680,240 Q700,220 710,190 Q720,160 705,130" stroke="#061210" stroke-width="25" fill="none" stroke-linecap="round"/>
    <!-- Right branches arching left -->
    <path d="M680,240 Q640,220 600,210 Q550,200 500,195 Q460,192 420,195" stroke="#061210" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M660,270 Q620,252 570,245 Q530,240 490,242" stroke="#061210" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M705,200 Q670,180 630,175 Q600,172 570,178" stroke="#061210" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Roots on path -->
  <g stroke="#0a1810" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7">
    <path d="M200,400 Q250,395 300,405 Q340,410 380,400"/>
    <path d="M420,405 Q460,398 500,408 Q540,412 600,402"/>
    <path d="M250,420 Q300,415 350,425"/>
    <path d="M450,418 Q500,412 550,422"/>
  </g>

  <!-- Mysterious light deeper in forest -->
  <ellipse cx="400" cy="220" rx="60" ry="40" fill="#30a068" opacity="0.08" filter="url(#soft)"/>
  <ellipse cx="400" cy="225" rx="30" ry="20" fill="#40c080" opacity="0.06" filter="url(#soft)"/>

  <!-- Bioluminescent mushrooms (ground level) -->
  <g filter="url(#glow)">
    <!-- Left cluster -->
    <ellipse cx="220" cy="388" rx="5" ry="3" fill="#30c080" opacity="0.5"/>
    <rect x="219" y="388" width="2" height="8" fill="#1a6040" opacity="0.4"/>
    <ellipse cx="235" cy="392" rx="4" ry="2.5" fill="#40d090" opacity="0.4"/>
    <rect x="234" y="392" width="2" height="6" fill="#1a6040" opacity="0.3"/>
    <!-- Right cluster -->
    <ellipse cx="570" cy="385" rx="5" ry="3" fill="#30c080" opacity="0.5"/>
    <rect x="569" y="385" width="2" height="8" fill="#1a6040" opacity="0.4"/>
    <ellipse cx="585" cy="390" rx="4" ry="2.5" fill="#40d090" opacity="0.4"/>
    <rect x="584" y="390" width="2" height="6" fill="#1a6040" opacity="0.3"/>
    <!-- Center -->
    <ellipse cx="390" cy="395" rx="4" ry="2.5" fill="#40d090" opacity="0.35"/>
    <rect x="389" y="395" width="2" height="6" fill="#1a6040" opacity="0.3"/>
  </g>

  <!-- Fireflies -->
  <g filter="url(#glow)">
    <circle cx="280" cy="250" r="2.5" fill="#e0d040" opacity="0.6"/>
    <circle cx="320" cy="280" r="2" fill="#c0b030" opacity="0.5"/>
    <circle cx="500" cy="260" r="2.5" fill="#e0d040" opacity="0.6"/>
    <circle cx="460" cy="230" r="2" fill="#c0b030" opacity="0.5"/>
    <circle cx="350" cy="310" r="1.5" fill="#e0d040" opacity="0.4"/>
    <circle cx="530" cy="290" r="1.5" fill="#c0b030" opacity="0.4"/>
    <circle cx="250" cy="320" r="2" fill="#e0d040" opacity="0.45"/>
    <circle cx="560" cy="320" r="2" fill="#e0d040" opacity="0.45"/>
    <circle cx="400" cy="270" r="2" fill="#c0b030" opacity="0.5"/>
    <circle cx="310" cy="350" r="1.5" fill="#e0d040" opacity="0.35"/>
    <circle cx="480" cy="345" r="1.5" fill="#c0b030" opacity="0.35"/>
  </g>

  <!-- Foreground dark trees (frame edges) -->
  <g fill="#040a08">
    <rect x="0" y="250" width="80" height="200"/><rect x="75" y="280" width="40" height="170"/>
    <polygon points="0,250 40,210 80,250"/>
    <rect x="720" y="260" width="80" height="190"/><rect x="685" y="290" width="40" height="160"/>
    <polygon points="720,260 760,218 800,260"/>
  </g>

  <!-- Mist -->
  <ellipse cx="400" cy="380" rx="400" ry="45" fill="#1a2828" opacity="0.3" filter="url(#soft)"/>
  <ellipse cx="300" cy="370" rx="150" ry="25" fill="#0c1818" opacity="0.25" filter="url(#soft)"/>

  <!-- Ground -->
  <rect x="0" y="405" width="800" height="45" fill="url(#ground)"/>

  <!-- Path -->
  <polygon points="350,450 450,450 470,395 330,395" fill="#0a1210" opacity="0.6"/>

  <radialGradient id="vig" cx="50%" cy="48%" r="58%">
    <stop offset="0%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.65"/>
  </radialGradient>
  <rect width="800" height="450" fill="url(#vig)"/>
  <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#060a08" stop-opacity="0"/><stop offset="100%" stop-color="#060a08" stop-opacity="0.8"/>
  </linearGradient>
  <rect width="800" height="450" fill="url(#fade)"/>
</svg>