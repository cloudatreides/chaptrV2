<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#050508"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.3">
      <stop offset="0%" stop-color="#6a3aaa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <rect width="400" height="300" fill="url(#glow)"/>
  <!-- Phone silhouette -->
  <rect x="170" y="80" width="60" height="110" rx="8" fill="#0a0510" opacity="0.9"/>
  <!-- Screen glow -->
  <rect x="175" y="88" width="50" height="90" rx="3" fill="#2a1a4a" opacity="0.5"/>
  <rect x="175" y="88" width="50" height="90" rx="3" fill="none" stroke="#6a3aaa" stroke-width="0.5" opacity="0.6"/>
  <!-- Screen lines (messages) -->
  <rect x="182" y="100" width="25" height="3" rx="1" fill="#6a3aaa" opacity="0.25"/>
  <rect x="188" y="110" width="30" height="3" rx="1" fill="#6a3aaa" opacity="0.2"/>
  <rect x="182" y="120" width="20" height="3" rx="1" fill="#6a3aaa" opacity="0.25"/>
  <rect x="190" y="130" width="28" height="3" rx="1" fill="#6a3aaa" opacity="0.15"/>
  <!-- Signal waves -->
  <circle cx="200" cy="135" r="50" fill="none" stroke="#6a3aaa" stroke-width="0.5" opacity="0.15"/>
  <circle cx="200" cy="135" r="80" fill="none" stroke="#6a3aaa" stroke-width="0.5" opacity="0.1"/>
  <circle cx="200" cy="135" r="110" fill="none" stroke="#6a3aaa" stroke-width="0.5" opacity="0.07"/>
  <!-- Floating particles -->
  <circle cx="100" cy="100" r="1.5" fill="#6a3aaa" opacity="0.3"/>
  <circle cx="300" cy="80" r="1" fill="#6a3aaa" opacity="0.25"/>
  <circle cx="80" cy="200" r="1" fill="#6a3aaa" opacity="0.2"/>
  <circle cx="330" cy="220" r="1.5" fill="#6a3aaa" opacity="0.2"/>
  <circle cx="140" cy="250" r="1" fill="#6a3aaa" opacity="0.15"/>
</svg>