<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080415"/><stop offset="50%" stop-color="#120a22"/>
      <stop offset="100%" stop-color="#0a0610"/>
    </linearGradient>
    <radialGradient id="phone-glow" cx="50%" cy="52%" r="22%">
      <stop offset="0%" stop-color="#8040c0" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#4020a0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#120a22" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="4"/></filter>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#120a1a"/><stop offset="100%" stop-color="#060410"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#sky)"/>
  <rect width="800" height="450" fill="url(#phone-glow)"/>

  <!-- Buildings (dark alley perspective) -->
  <g fill="#0a0618">
    <!-- Left building block -->
    <rect x="0" y="80" width="250" height="370"/><rect x="245" y="120" width="60" height="330"/>
    <!-- Right building block -->
    <rect x="500" y="90" width="300" height="360"/><rect x="490" y="130" width="60" height="320"/>
    <!-- Rooftop details -->
    <rect x="40" y="70" width="80" height="18"/><rect x="160" y="72" width="65" height="16"/>
    <rect x="540" y="80" width="90" height="18"/><rect x="680" y="78" width="70" height="20"/>
    <!-- Water towers -->
    <rect x="70" y="42" width="30" height="32" rx="3"/><rect x="62" y="40" width="46" height="6"/>
    <rect x="68" y="74" width="6" height="10"/><rect x="88" y="74" width="6" height="10"/>
    <rect x="600" y="48" width="35" height="35" rx="3"/><rect x="592" y="46" width="50" height="6"/>
  </g>

  <!-- Sparse building windows -->
  <g fill="#1a1535" opacity="0.7">
    <rect x="20" y="120" width="10" height="14" rx="1"/><rect x="50" y="125" width="10" height="14" rx="1"/>
    <rect x="20" y="155" width="10" height="14" rx="1"/><rect x="80" y="150" width="10" height="14" rx="1"/>
    <rect x="120" y="130" width="10" height="14" rx="1"/><rect x="170" y="140" width="10" height="14" rx="1"/>
    <rect x="530" y="125" width="10" height="14" rx="1"/><rect x="570" y="130" width="10" height="14" rx="1"/>
    <rect x="630" y="120" width="10" height="14" rx="1"/><rect x="700" y="135" width="10" height="14" rx="1"/>
    <rect x="750" y="125" width="10" height="14" rx="1"/>
  </g>
  <!-- Few lit windows (cold) -->
  <g filter="url(#glow)">
    <rect x="50" y="180" width="10" height="14" fill="#3040a0" opacity="0.6" rx="1"/>
    <rect x="180" y="200" width="10" height="14" fill="#2838a0" opacity="0.5" rx="1"/>
    <rect x="700" y="170" width="10" height="14" fill="#3040a0" opacity="0.6" rx="1"/>
  </g>

  <!-- Phone silhouette (center) -->
  <g filter="url(#glow)">
    <rect x="372" y="175" width="56" height="100" rx="8" fill="#0a0818" stroke="#3020a0" stroke-width="1.5"/>
    <!-- Screen -->
    <rect x="378" y="185" width="44" height="75" rx="4" fill="#6030c0" opacity="0.4"/>
    <rect x="378" y="185" width="44" height="75" rx="4" fill="none" stroke="#8050d0" stroke-width="0.5" opacity="0.8"/>
    <!-- Screen glitch lines -->
    <rect x="380" y="200" width="40" height="2" fill="#a060e0" opacity="0.6"/>
    <rect x="380" y="220" width="30" height="1.5" fill="#a060e0" opacity="0.4"/>
    <rect x="385" y="235" width="35" height="1.5" fill="#a060e0" opacity="0.5"/>
    <rect x="380" y="248" width="25" height="1" fill="#a060e0" opacity="0.3"/>
  </g>

  <!-- Signal waves from phone -->
  <g stroke="#8040c0" fill="none" opacity="0.3" stroke-width="1.5">
    <path d="M430,225 Q445,215 440,200"/>
    <path d="M440,228 Q460,212 452,192"/>
    <path d="M448,232 Q475,210 464,185"/>
    <path d="M370,225 Q355,215 360,200"/>
    <path d="M360,228 Q340,212 348,192"/>
  </g>

  <!-- Surveillance camera -->
  <g fill="#1a1028">
    <rect x="495" y="155" width="25" height="12" rx="2"/>
    <rect x="488" y="148" width="8" height="12"/>
    <circle cx="522" cy="161" r="5" fill="#0a0618" stroke="#2a1840" stroke-width="1"/>
    <circle cx="522" cy="161" r="2" fill="#ff2020" opacity="0.7" filter="url(#glow)"/>
  </g>

  <!-- Rain streaks -->
  <g stroke="#2a1840" stroke-width="0.7" opacity="0.4">
    <line x1="320" y1="0" x2="315" y2="60"/><line x1="350" y1="20" x2="345" y2="80"/>
    <line x1="420" y1="0" x2="415" y2="55"/><line x1="460" y1="15" x2="455" y2="75"/>
    <line x1="380" y1="60" x2="375" y2="130"/><line x1="440" y1="55" x2="435" y2="125"/>
    <line x1="340" y1="90" x2="335" y2="160"/><line x1="470" y1="85" x2="465" y2="155"/>
    <line x1="360" y1="280" x2="355" y2="350"/><line x1="430" y1="285" x2="425" y2="355"/>
    <line x1="395" y1="290" x2="390" y2="360"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="380" width="800" height="70" fill="url(#ground)"/>

  <!-- Puddle with phone glow reflection -->
  <ellipse cx="400" cy="405" rx="80" ry="15" fill="#1a1030" opacity="0.8" filter="url(#soft)"/>
  <ellipse cx="400" cy="405" rx="40" ry="8" fill="#4020a0" opacity="0.25" filter="url(#soft)"/>

  <!-- Fog/mist -->
  <ellipse cx="400" cy="370" rx="500" ry="50" fill="#1a1030" opacity="0.3" filter="url(#soft)"/>
  <ellipse cx="250" cy="380" rx="200" ry="30" fill="#120a20" opacity="0.4" filter="url(#soft)"/>

  <radialGradient id="vig" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
  </radialGradient>
  <rect width="800" height="450" fill="url(#vig)"/>
  <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#060410" stop-opacity="0"/><stop offset="100%" stop-color="#060410" stop-opacity="0.85"/>
  </linearGradient>
  <rect width="800" height="450" fill="url(#fade)"/>
</svg>