<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0820"/>
      <stop offset="40%" stop-color="#1a1045"/>
      <stop offset="75%" stop-color="#3d2060"/>
      <stop offset="100%" stop-color="#c08030"/>
    </linearGradient>
    <radialGradient id="moon-glow" cx="78%" cy="18%" r="18%">
      <stop offset="0%" stop-color="#ffe8a0" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#c09040" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1a1045" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="river" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1848"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#sky)"/>
  <rect width="800" height="450" fill="url(#moon-glow)"/>

  <!-- Moon -->
  <circle cx="624" cy="78" r="28" fill="#fff4d0" opacity="0.95"/>
  <circle cx="612" cy="70" r="26" fill="#1a1045" opacity="0.9"/>

  <!-- Stars -->
  <g fill="#e0d0ff" opacity="0.7">
    <circle cx="55" cy="30" r="1.5"/><circle cx="140" cy="18" r="1"/><circle cx="210" cy="50" r="1.2"/>
    <circle cx="290" cy="25" r="1.5"/><circle cx="360" cy="60" r="1"/><circle cx="430" cy="35" r="0.8"/>
    <circle cx="500" cy="22" r="1.2"/><circle cx="560" cy="55" r="1"/><circle cx="700" cy="30" r="1.5"/>
    <circle cx="750" cy="65" r="1"/><circle cx="100" cy="75" r="0.8"/><circle cx="480" cy="70" r="1"/>
  </g>

  <!-- Far rooftops (dark purple) -->
  <g fill="#12082a">
    <rect x="0" y="200" width="60" height="250"/><rect x="55" y="185" width="45" height="265"/>
    <rect x="95" y="195" width="55" height="255"/><rect x="145" y="175" width="40" height="275"/>
    <rect x="580" y="190" width="50" height="260"/><rect x="625" y="180" width="60" height="270"/>
    <rect x="680" y="195" width="45" height="255"/><rect x="720" y="185" width="80" height="265"/>
    <!-- Mansard roof shapes -->
    <polygon points="0,200 30,175 60,200"/><polygon points="55,185 78,162 100,185"/>
    <polygon points="95,195 122,170 150,195"/><polygon points="145,175 165,150 185,175"/>
    <polygon points="580,190 605,168 630,190"/><polygon points="625,180 655,155 685,180"/>
    <polygon points="720,185 760,160 800,185"/>
    <!-- Chimney pots -->
    <rect x="25" y="168" width="8" height="14"/><rect x="72" y="155" width="7" height="12"/>
    <rect x="118" y="163" width="8" height="14"/><rect x="160" y="143" width="7" height="12"/>
    <rect x="600" y="160" width="8" height="14"/><rect x="650" y="148" width="7" height="12"/>
    <rect x="745" y="152" width="8" height="14"/>
  </g>

  <!-- Far windows (warm) -->
  <g fill="#c89040" opacity="0.7">
    <rect x="12" y="210" width="8" height="10" rx="1"/><rect x="32" y="212" width="8" height="10" rx="1"/>
    <rect x="12" y="232" width="8" height="10" rx="1"/><rect x="32" y="235" width="8" height="10" rx="1" fill="#e0a850"/>
    <rect x="108" y="205" width="8" height="10" rx="1"/><rect x="128" y="208" width="8" height="10" rx="1" fill="#e0a850"/>
    <rect x="595" y="200" width="8" height="10" rx="1"/><rect x="615" y="203" width="8" height="10" rx="1" fill="#e0a850"/>
    <rect x="640" y="195" width="8" height="10" rx="1"/><rect x="660" y="198" width="8" height="10" rx="1"/>
    <rect x="735" y="198" width="8" height="10" rx="1" fill="#e0a850"/><rect x="755" y="200" width="8" height="10" rx="1"/>
  </g>

  <!-- Eiffel Tower (mid-ground, detailed) -->
  <g fill="#0e0620" opacity="0.95">
    <rect x="388" y="68" width="24" height="16"/>
    <polygon points="400,68 392,84 408,84"/>
    <rect x="370" y="84" width="60" height="8"/>
    <polygon points="370,92 350,200 450,200 430,92"/>
    <rect x="345" y="200" width="110" height="10"/>
    <polygon points="345,210 320,340 480,340 455,210"/>
    <rect x="314" y="340" width="172" height="12"/>
    <polygon points="314,352 280,420 520,420 486,352"/>
    <!-- Lattice detail -->
    <rect x="360" y="130" width="80" height="5" opacity="0.6"/>
    <rect x="348" y="170" width="104" height="5" opacity="0.6"/>
    <rect x="330" y="250" width="140" height="5" opacity="0.5"/>
    <rect x="322" y="300" width="156" height="5" opacity="0.5"/>
    <!-- Arch at base -->
    <path d="M340,352 Q400,320 460,352" fill="#0e0620" opacity="0.8"/>
  </g>
  <!-- Tower lights -->
  <g filter="url(#glow)">
    <circle cx="400" cy="70" r="4" fill="#ffd070" opacity="0.9"/>
    <circle cx="400" cy="92" r="3" fill="#ffc050" opacity="0.7"/>
  </g>

  <!-- Foreground buildings (closest, darkest) -->
  <g fill="#08041a">
    <rect x="0" y="280" width="160" height="170"/>
    <rect x="155" y="295" width="120" height="155"/>
    <rect x="530" y="290" width="110" height="160"/>
    <rect x="635" y="275" width="165" height="175"/>
    <polygon points="0,280 80,255 160,280"/><polygon points="155,295 215,272 275,295"/>
    <polygon points="530,290 585,268 640,290"/><polygon points="635,275 718,248 800,275"/>
    <!-- Chimneys -->
    <rect x="50" y="248" width="10" height="16"/><rect x="110" y="250" width="8" height="14"/>
    <rect x="200" y="265" width="9" height="14"/><rect x="570" y="260" width="9" height="14"/>
    <rect x="680" y="240" width="10" height="16"/><rect x="750" y="244" width="8" height="14"/>
  </g>

  <!-- Foreground windows (bright warm) -->
  <g filter="url(#glow)">
    <rect x="20" y="300" width="12" height="16" fill="#d09030" rx="1"/>
    <rect x="50" y="302" width="12" height="16" fill="#c08028" rx="1"/>
    <rect x="90" y="298" width="12" height="16" fill="#d09030" rx="1"/>
    <rect x="120" y="305" width="12" height="16" fill="#a07020" rx="1"/>
    <rect x="175" y="310" width="12" height="16" fill="#d09030" rx="1"/>
    <rect x="210" y="312" width="12" height="16" fill="#c08028" rx="1"/>
    <rect x="550" y="305" width="12" height="16" fill="#c08028" rx="1"/>
    <rect x="590" y="308" width="12" height="16" fill="#d09030" rx="1"/>
    <rect x="655" y="295" width="12" height="16" fill="#d09030" rx="1"/>
    <rect x="690" y="298" width="12" height="16" fill="#c08028" rx="1"/>
    <rect x="730" y="292" width="12" height="16" fill="#a07020" rx="1"/>
    <rect x="765" y="296" width="12" height="16" fill="#d09030" rx="1"/>
  </g>

  <!-- Street lamp -->
  <g stroke="#3a2860" stroke-width="3" fill="none">
    <line x1="490" y1="345" x2="490" y2="420"/>
    <path d="M490,345 Q490,330 505,328"/>
  </g>
  <circle cx="505" cy="328" r="5" fill="#ffd060" filter="url(#glow)"/>

  <!-- Seine river -->
  <rect x="0" y="385" width="800" height="65" fill="url(#river)"/>
  <!-- River reflections -->
  <ellipse cx="400" cy="405" rx="300" ry="20" fill="#2a1850" opacity="0.5" filter="url(#soft)"/>
  <ellipse cx="400" cy="410" rx="100" ry="8" fill="#c08030" opacity="0.2" filter="url(#soft)"/>
  <!-- Tower reflection -->
  <rect x="380" y="390" width="40" height="55" fill="#1a1040" opacity="0.3" filter="url(#soft)"/>

  <!-- Atmospheric mist -->
  <ellipse cx="400" cy="380" rx="500" ry="40" fill="#3d2060" opacity="0.25" filter="url(#soft)"/>

  <!-- Vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
    <stop offset="0%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="800" height="450" fill="url(#vignette)"/>

  <!-- Bottom fade -->
  <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0a0818" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0a0818" stop-opacity="0.8"/>
  </linearGradient>
  <rect width="800" height="450" fill="url(#fade)"/>
</svg>