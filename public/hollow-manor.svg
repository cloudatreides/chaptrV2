<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="45%" stop-color="#2d1255"/>
      <stop offset="100%" stop-color="#4a1e6e"/>
    </linearGradient>
    <radialGradient id="moon-glow" cx="65%" cy="22%" r="20%">
      <stop offset="0%" stop-color="#c8a0ff" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#7030c0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1a0a2e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a1855"/>
      <stop offset="100%" stop-color="#0d0618"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="450" fill="url(#sky)"/>

  <!-- Moon glow halo -->
  <circle cx="520" cy="95" r="90" fill="url(#moon-glow)"/>

  <!-- Moon -->
  <circle cx="520" cy="95" r="36" fill="#f0e8ff" opacity="0.95"/>
  <!-- Moon shadow (crescent) -->
  <circle cx="505" cy="86" r="34" fill="#2d1255" opacity="0.92"/>

  <!-- Stars -->
  <g fill="#e0c8ff" opacity="0.8">
    <circle cx="60" cy="40" r="1.5"/><circle cx="140" cy="22" r="1"/><circle cx="200" cy="55" r="1.2"/>
    <circle cx="280" cy="30" r="1.5"/><circle cx="320" cy="68" r="1"/><circle cx="180" cy="78" r="0.8"/>
    <circle cx="90" cy="90" r="1"/><circle cx="350" cy="20" r="1.2"/><circle cx="420" cy="45" r="0.8"/>
    <circle cx="600" cy="28" r="1.5"/><circle cx="660" cy="55" r="1"/><circle cx="730" cy="35" r="1.2"/>
    <circle cx="700" cy="80" r="0.8"/><circle cx="760" cy="18" r="1"/><circle cx="580" cy="72" r="1.2"/>
  </g>

  <!-- Distant treeline (medium purple) -->
  <g fill="#3a1860" opacity="0.9">
    <polygon points="0,280 20,240 35,255 50,230 70,248 90,222 110,240 130,228 155,245 175,220 195,238 220,215 240,232 260,250 280,300 0,300"/>
    <polygon points="520,285 545,240 560,255 575,228 595,245 615,220 635,238 655,225 680,242 705,215 725,232 750,248 770,230 800,245 800,300 520,300"/>
  </g>

  <!-- Dead trees (bright purple-grey silhouettes) -->
  <g stroke="#5a3080" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.85">
    <!-- Left tree 1 -->
    <line x1="55" y1="380" x2="55" y2="235"/>
    <line x1="55" y1="268" x2="28" y2="242"/><line x1="28" y1="242" x2="12" y2="230"/>
    <line x1="55" y1="280" x2="20" y2="270"/>
    <line x1="55" y1="268" x2="82" y2="248"/><line x1="82" y1="248" x2="98" y2="236"/>
    <line x1="55" y1="290" x2="88" y2="282"/>
    <!-- Left tree 2 -->
    <line x1="120" y1="380" x2="120" y2="248" stroke-width="3"/>
    <line x1="120" y1="272" x2="96" y2="255" stroke-width="2.5"/>
    <line x1="120" y1="285" x2="92" y2="278" stroke-width="2"/>
    <line x1="120" y1="272" x2="148" y2="258" stroke-width="2.5"/>
    <!-- Right tree 1 -->
    <line x1="720" y1="380" x2="720" y2="238"/>
    <line x1="720" y1="265" x2="695" y2="248"/><line x1="695" y1="248" x2="678" y2="235"/>
    <line x1="720" y1="278" x2="690" y2="272"/>
    <line x1="720" y1="265" x2="748" y2="250"/><line x1="748" y1="250" x2="764" y2="238"/>
    <!-- Right tree 2 -->
    <line x1="760" y1="380" x2="760" y2="252" stroke-width="3"/>
    <line x1="760" y1="275" x2="738" y2="260" stroke-width="2.5"/>
    <line x1="760" y1="275" x2="784" y2="262" stroke-width="2.5"/>
    <line x1="760" y1="292" x2="785" y2="285" stroke-width="2"/>
  </g>

  <!-- Manor silhouette (dark against purple sky) -->
  <g fill="#180830">
    <!-- Main building body -->
    <rect x="270" y="230" width="260" height="190"/>
    <!-- Left wing -->
    <rect x="200" y="268" width="90" height="152"/>
    <!-- Right wing -->
    <rect x="510" y="272" width="85" height="148"/>
    <!-- Central tower tall -->
    <rect x="340" y="148" width="120" height="100"/>
    <!-- Left tower -->
    <rect x="208" y="195" width="62" height="85"/>
    <!-- Right tower -->
    <rect x="530" y="200" width="58" height="85"/>
    <!-- Spires -->
    <polygon points="396,82 406,148 386,148"/>
    <polygon points="404,72 418,148 390,148"/>
    <polygon points="398,68 416,148 382,148"/>
    <polygon points="239,160 248,198 230,198"/>
    <polygon points="559,165 568,202 550,202"/>
    <!-- Battlements on central tower -->
    <rect x="336" y="144" width="14" height="12"/>
    <rect x="358" y="144" width="14" height="12"/>
    <rect x="380" y="144" width="14" height="12"/>
    <rect x="402" y="144" width="14" height="12"/>
    <rect x="424" y="144" width="14" height="12"/>
    <rect x="446" y="144" width="14" height="12"/>
  </g>

  <!-- Lit windows (warm amber glow) -->
  <g filter="url(#glow)">
    <rect x="358" y="255" width="18" height="24" fill="#c87820" rx="2"/>
    <rect x="424" y="255" width="18" height="24" fill="#c87820" rx="2"/>
    <rect x="356" y="310" width="18" height="24" fill="#a06018" rx="2"/>
    <rect x="426" y="310" width="18" height="24" fill="#a06018" rx="2"/>
    <rect x="218" y="290" width="15" height="20" fill="#a06018" rx="2"/>
    <rect x="248" y="292" width="15" height="20" fill="#7a4810" rx="2"/>
    <rect x="538" y="293" width="15" height="20" fill="#a06018" rx="2"/>
    <rect x="562" y="295" width="15" height="20" fill="#7a4810" rx="2"/>
    <!-- Tower windows -->
    <rect x="373" y="175" width="12" height="16" fill="#c87820" rx="2"/>
    <rect x="415" y="175" width="12" height="16" fill="#a06018" rx="2"/>
  </g>

  <!-- Ground mist (bright purple) -->
  <ellipse cx="400" cy="420" rx="500" ry="75" fill="#5a2880" opacity="0.45" filter="url(#soft)"/>
  <ellipse cx="400" cy="435" rx="450" ry="55" fill="#7a3090" opacity="0.3" filter="url(#soft)"/>

  <!-- Ground -->
  <rect x="0" y="380" width="800" height="70" fill="url(#ground)"/>

  <!-- Bottom gradient fade -->
  <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0d0618" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0d0618" stop-opacity="0.85"/>
  </linearGradient>
  <rect width="800" height="450" fill="url(#fade)"/>
</svg>
